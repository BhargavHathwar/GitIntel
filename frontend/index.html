<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitIntel — Repository Intelligence</title>
  <script>
    // Initialize theme inline to avoid Flash of Unstyled Content (FOUC)
    const savedTheme = localStorage.getItem('theme') || 'light';
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface":                   "var(--surface)",
            "surface-container-lowest":  "var(--surface-container-lowest)",
            "surface-container-low":     "var(--surface-container-low)",
            "surface-container":         "var(--surface-container)",
            "surface-container-high":    "var(--surface-container-high)",
            "surface-container-highest": "var(--surface-container-highest)",
            "on-surface":                "var(--on-surface)",
            "on-surface-variant":        "var(--on-surface-variant)",
            "outline":                   "var(--outline)",
            "outline-variant":           "var(--outline-variant)",
            "primary":                   "var(--primary)",
            "primary-container":         "var(--primary-container)",
            "on-primary":                "var(--on-primary)",
            "secondary-container":       "var(--secondary-container)",
            "on-secondary-container":    "var(--on-secondary-container)",
            "tertiary":                  "var(--tertiary)",
            "tertiary-container":        "var(--tertiary-container)",
            "on-tertiary-container":     "var(--on-tertiary-container)",
            "error":                     "var(--error)",
            "background":                "var(--background)",

            // Theme-adaptive containers and borders
            "primary-container-low":     "var(--primary-container-low)",
            "primary-container-border":  "var(--primary-container-border)",
            "tertiary-container-low":    "var(--tertiary-container-low)",
            "tertiary-container-border": "var(--tertiary-container-border)",
            "error-container-low":       "var(--error-container-low)",
            "error-container-border":    "var(--error-container-border)",
            "chat-user-bg":              "var(--chat-user-bg)",
            "chat-user-border":          "var(--chat-user-border)",
          },
          fontFamily: {
            "display":  ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Helvetica", "Arial", "sans-serif"],
            "headline": ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Helvetica", "Arial", "sans-serif"],
            "body":     ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Helvetica", "Arial", "sans-serif", "Apple Color Emoji", "Segoe UI Emoji"],
            "code":     ["ui-monospace", "SFMono-Regular", "SF Mono", "Menlo", "Consolas", "Liberation Mono", "monospace"],
          },
          borderRadius: {
            DEFAULT: "6px", sm: "4px", md: "6px",
            lg: "8px", xl: "12px", full: "9999px",
          },
        }
      }
    }
  </script>
  <style>
    :root {
      --background: #f6f8fa;
      --surface: #ffffff;
      --surface-container-lowest: #ffffff;
      --surface-container-low: #f6f8fa;
      --surface-container: #ffffff;
      --surface-container-high: #f6f8fa;
      --surface-container-highest: #eaeef2;
      --on-surface: #24292f;
      --on-surface-variant: #57606a;
      --outline: #57606a;
      --outline-variant: #d0d7de;
      --primary: #0969da;
      --primary-container: #ddf4ff;
      --on-primary: #ffffff;
      --secondary-container: #eaeef2;
      --on-secondary-container: #24292f;
      --tertiary: #2da44e;
      --tertiary-container: #dafbe1;
      --on-tertiary-container: #1a7f37;
      --error: #cf222e;

      --primary-container-low: rgba(9, 105, 218, 0.05);
      --primary-container-border: rgba(9, 105, 218, 0.15);
      --tertiary-container-low: rgba(45, 164, 78, 0.06);
      --tertiary-container-border: rgba(45, 164, 78, 0.15);
      --error-container-low: rgba(207, 34, 46, 0.05);
      --error-container-border: rgba(207, 34, 46, 0.15);
      --chat-user-bg: rgba(9, 105, 218, 0.06);
      --chat-user-border: rgba(9, 105, 218, 0.15);
      --primary-glow: rgba(9, 105, 218, 0.03);

      --presentation-color: #0969da;
      --presentation-bg: rgba(9, 105, 218, 0.06);
      --presentation-border: rgba(9, 105, 218, 0.15);

      --application-color: #8250df;
      --application-bg: rgba(130, 80, 223, 0.06);
      --application-border: rgba(130, 80, 223, 0.15);

      --infrastructure-color: #bc4c00;
      --infrastructure-bg: rgba(188, 76, 0, 0.06);
      --infrastructure-border: rgba(188, 76, 0, 0.15);

      --persistence-color: #1a7f37;
      --persistence-bg: rgba(26, 127, 55, 0.06);
      --persistence-border: rgba(26, 127, 55, 0.15);
    }

    .dark {
      --background: #0d1117;
      --surface: #0d1117;
      --surface-container-lowest: #010409;
      --surface-container-low: #0d1117;
      --surface-container: #161b22;
      --surface-container-high: #161b22;
      --surface-container-highest: #21262d;
      --on-surface: #c9d1d9;
      --on-surface-variant: #8b949e;
      --outline: #8b949e;
      --outline-variant: #30363d;
      --primary: #58a6ff;
      --primary-container: #1f6feb;
      --on-primary: #ffffff;
      --secondary-container: #21262d;
      --on-secondary-container: #c9d1d9;
      --tertiary: #238636;
      --tertiary-container: rgba(56, 139, 253, 0.15);
      --on-tertiary-container: #3fb950;
      --error: #ff7b72;

      --primary-container-low: rgba(88, 166, 255, 0.1);
      --primary-container-border: rgba(88, 166, 255, 0.25);
      --tertiary-container-low: rgba(63, 185, 80, 0.1);
      --tertiary-container-border: rgba(63, 185, 80, 0.25);
      --error-container-low: rgba(240, 128, 128, 0.1);
      --error-container-border: rgba(240, 128, 128, 0.25);
      --chat-user-bg: rgba(88, 166, 255, 0.12);
      --chat-user-border: rgba(88, 166, 255, 0.25);
      --primary-glow: rgba(88, 166, 255, 0.05);

      --presentation-color: #58a6ff;
      --presentation-bg: rgba(88, 166, 255, 0.1);
      --presentation-border: rgba(88, 166, 255, 0.2);

      --application-color: #bc8cff;
      --application-bg: rgba(188, 140, 255, 0.1);
      --application-border: rgba(188, 140, 255, 0.2);

      --infrastructure-color: #f0883e;
      --infrastructure-bg: rgba(240, 136, 62, 0.1);
      --infrastructure-border: rgba(240, 136, 62, 0.2);

      --persistence-color: #3fb950;
      --persistence-bg: rgba(63, 185, 80, 0.1);
      --persistence-border: rgba(63, 185, 80, 0.2);
    }

    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; display:inline-block; vertical-align:middle; line-height:1; }
    .icon-fill { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
    ::-webkit-scrollbar { width:8px; height:8px; }
    ::-webkit-scrollbar-track { background: var(--background); }
    ::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius:6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--outline); }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin    { to{transform:rotate(360deg);} }
    @keyframes blink   { 0%,100%{opacity:1;}50%{opacity:0;} }
    @keyframes shimmer { 0%{background-position:-400px 0;}100%{background-position:400px 0;} }
    .fade-up { animation:fadeUp 0.25s ease forwards; }
    .input-glow:focus-within { box-shadow:0 0 0 2px var(--primary-container-border); }
    .card-hover { transition:border-color 0.2s; }
    .card-hover:hover { border-color: var(--primary) !important; }
    .skeleton { background:linear-gradient(90deg, var(--surface-container-low) 25%, var(--surface-container-high) 50%, var(--surface-container-low) 75%); background-size:400px 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
    .typing::after { content:'▋'; animation:blink 0.75s infinite; color: var(--primary); margin-left:2px; }
    .md-content pre  { background: var(--surface-container-low); border:1px solid var(--outline-variant); border-radius:6px; padding:12px 16px; overflow-x:auto; font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace; font-size:12px; color: var(--on-surface); line-height:1.6; margin:8px 0; white-space:pre; }
    .md-content code { background: var(--primary-container-low); color: var(--primary); padding:2px 5px; border-radius:4px; font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace; font-size:12px; }
    .md-content pre code { background:none; color:inherit; padding:0; }
    .md-content h1 { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size:20px; font-weight:600; color: var(--on-surface); margin:16px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--outline-variant); }
    .md-content h2 { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size:17px; font-weight:600; color: var(--on-surface); margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--outline-variant); }
    .md-content h3 { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size:15px; font-weight:600; color: var(--on-surface-variant); margin:12px 0 6px; }
    .md-content p  { font-size:14px; color: var(--on-surface-variant); line-height:1.72; margin:6px 0; }
    .md-content ul { margin:6px 0 6px 20px; padding:0; list-style-type:disc; }
    .md-content li { font-size:14px; color: var(--on-surface-variant); line-height:1.7; margin:4px 0; }
    .md-content strong { color: var(--on-surface); font-weight:600; }
  </style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
