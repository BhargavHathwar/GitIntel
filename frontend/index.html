<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitIntel — Repository Intelligence</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;450;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface":                   "#10141a",
            "surface-container-lowest":  "#0a0e14",
            "surface-container-low":     "#181c22",
            "surface-container":         "#1c2026",
            "surface-container-high":    "#262a31",
            "surface-container-highest": "#31353c",
            "on-surface":                "#dfe2eb",
            "on-surface-variant":        "#c1c6d6",
            "outline":                   "#8b909f",
            "outline-variant":           "#414754",
            "primary":                   "#acc7ff",
            "primary-container":         "#498fff",
            "on-primary":                "#002f68",
            "secondary-container":       "#424a54",
            "on-secondary-container":    "#b1b9c5",
            "tertiary":                  "#67df70",
            "tertiary-container":        "#27a640",
            "on-tertiary-container":     "#00320a",
            "error":                     "#ffb4ab",
            "background":                "#10141a",
          },
          fontFamily: {
            "display":  ["Hanken Grotesk", "sans-serif"],
            "headline": ["Hanken Grotesk", "sans-serif"],
            "body":     ["Inter", "sans-serif"],
            "code":     ["JetBrains Mono", "monospace"],
          },
          borderRadius: {
            DEFAULT: "0.25rem", sm: "0.125rem", md: "0.375rem",
            lg: "0.5rem", xl: "0.75rem", full: "9999px",
          },
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; display:inline-block; vertical-align:middle; line-height:1; }
    .icon-fill { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:#10141a; }
    ::-webkit-scrollbar-thumb { background:#414754; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:#8b909f; }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin    { to{transform:rotate(360deg);} }
    @keyframes blink   { 0%,100%{opacity:1;}50%{opacity:0;} }
    @keyframes shimmer { 0%{background-position:-400px 0;}100%{background-position:400px 0;} }
    .fade-up { animation:fadeUp 0.25s ease forwards; }
    .input-glow:focus-within { box-shadow:0 0 0 2px rgba(172,199,255,0.2); }
    .card-hover { transition:border-color 0.2s; }
    .card-hover:hover { border-color:#acc7ff !important; }
    .skeleton { background:linear-gradient(90deg,#181c22 25%,#262a31 50%,#181c22 75%); background-size:400px 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
    .typing::after { content:'▋'; animation:blink 0.75s infinite; color:#acc7ff; margin-left:2px; }
    .md-content pre  { background:#0a0e14; border:1px solid #414754; border-radius:6px; padding:12px 16px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:12px; color:#9dd49d; line-height:1.6; margin:8px 0; white-space:pre; }
    .md-content code { background:rgba(172,199,255,0.1); color:#acc7ff; padding:1px 6px; border-radius:3px; font-family:'JetBrains Mono',monospace; font-size:12px; }
    .md-content pre code { background:none; color:inherit; padding:0; }
    .md-content h1 { font-family:'Hanken Grotesk'; font-size:20px; font-weight:700; color:#dfe2eb; margin:14px 0 6px; }
    .md-content h2 { font-family:'Hanken Grotesk'; font-size:17px; font-weight:600; color:#dfe2eb; margin:12px 0 5px; }
    .md-content h3 { font-family:'Hanken Grotesk'; font-size:15px; font-weight:600; color:#c1c6d6; margin:10px 0 4px; }
    .md-content p  { font-size:14px; color:#c1c6d6; line-height:1.72; margin:4px 0; }
    .md-content ul { margin:4px 0 4px 18px; padding:0; }
    .md-content li { font-size:14px; color:#c1c6d6; line-height:1.7; margin:3px 0; }
    .md-content strong { color:#dfe2eb; font-weight:600; }
  </style>
</head>
<body class="bg-background text-on-surface font-body antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
